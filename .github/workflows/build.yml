name: CI way

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # 1. do git pull
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Java (PetClinic is Java app)
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Build application
    - name: Build with Maven
      run: mvn clean install -DskipTests -Dcheckstyle.skip=true

    # 5. copying artifact
    - name: uploading jars
      uses: actions/upload-artifact@v4   
      with:
        name: app-jar
        path: target/*.jar

    # 6. DockerHub login
    - name: Login into DockerHub
      uses: docker/login-action@v4   
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}

    # 7. Build Docker image
    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/petclinic:v1 .


    - name: docker push
      run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/petclinic:v1





